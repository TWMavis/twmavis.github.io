<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新增缺失 - 工地缺失管理系統</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ec5b13",
          "background-light": "#f8f6f6",
        },
        fontFamily: { "display": ["Inter", "Noto Sans TC", "sans-serif"] },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { min-height: 100dvh; font-family: 'Inter', 'Noto Sans TC', sans-serif; }
  .photo-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
  .photo-slot { width: 80px; height: 80px; border: 2px dashed #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; color: #94a3b8; }
  .photo-slot:hover { border-color: #ec5b13; color: #ec5b13; background: #fff5f0; }
  input[type=select], select { background-image: none; }
  select { -webkit-appearance: none; appearance: none; }
  .custom-select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .field-label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.375rem; }
  .field-label span { color: #ec5b13; margin-left: 4px; }
</style>
</head>
<body class="bg-background-light font-display text-slate-900 min-h-screen pb-28">

<!-- Header -->
<header class="sticky top-0 z-50 bg-background-light/90 backdrop-blur-md border-b border-primary/10 px-4 py-3 flex items-center gap-3">
  <button onclick="history.back()" class="p-2 hover:bg-primary/10 rounded-full transition-colors">
    <span class="material-symbols-outlined text-primary">arrow_back</span>
  </button>
  <h1 class="text-xl font-bold tracking-tight flex-1">新增缺失</h1>
  <span class="text-xs text-slate-400">Add Issue</span>
</header>

<main class="max-w-xl mx-auto px-4 pt-5 space-y-5">

  <!-- 系統別 -->
  <div>
    <label class="field-label">系統別 (System Category)<span>*</span></label>
    <div class="relative">
      <select id="select-system" class="custom-select w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
        <option value="">請選擇系統別</option>
        <option value="機電工程系統">機電工程系統</option>
        <option value="土建工程">土建工程</option>
        <option value="裝修工程">裝修工程</option>
        <option value="消防系統">消防系統</option>
        <option value="給排水工程">給排水工程</option>
        <option value="其他">其他</option>
      </select>
    </div>
  </div>

  <!-- 缺失單號 -->
  <div>
    <label class="field-label">缺失單號 (Issue No.)</label>
    <input id="issue-no" type="text" readonly
      class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm text-slate-400 cursor-not-allowed"
      value=""/>
  </div>

  <!-- 合約編號 -->
  <div>
    <label class="field-label">合約編號 (Contract No.)<span>*</span></label>
    <div class="relative">
      <select id="select-contract" class="custom-select w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
        <option value="">請選擇合約</option>
        <option value="CTR-2024-001">CTR-2024-001 | 福麟建設 A棟</option>
        <option value="CTR-2024-002">CTR-2024-002 | 福麟建設 B棟</option>
        <option value="CTR-2024-003">CTR-2024-003 | 公共工程部</option>
        <option value="CTR-2024-004">CTR-2024-004 | 水電設備工程</option>
      </select>
    </div>
  </div>

  <!-- 合約條款罰金 -->
  <div>
    <label class="field-label">合約條款罰金 (Penalty)</label>
    <div class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-sm text-slate-500 flex items-center gap-2">
      <span class="material-symbols-outlined text-primary" style="font-size:18px;">payments</span>
      <span id="penalty-display">$ 5,000 / 次</span>
    </div>
  </div>

  <!-- 樓層 -->
  <div>
    <label class="field-label">樓層 (Floor)<span>*</span></label>
    <div class="relative">
      <select id="select-floor" class="custom-select w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
        <option value="">請選擇樓層</option>
        <option value="RF">RF（屋頂）</option>
        <option value="20F">20F</option>
        <option value="19F">19F</option>
        <option value="18F">18F</option>
        <option value="17F">17F</option>
        <option value="16F">16F</option>
        <option value="15F">15F</option>
        <option value="14F">14F</option>
        <option value="13F">13F</option>
        <option value="12F">12F</option>
        <option value="11F">11F</option>
        <option value="10F">10F</option>
        <option value="9F">9F</option>
        <option value="8F">8F</option>
        <option value="7F">7F</option>
        <option value="6F">6F</option>
        <option value="5F">5F</option>
        <option value="4F">4F</option>
        <option value="3F">3F</option>
        <option value="2F">2F</option>
        <option value="1F">1F</option>
        <option value="B1">B1（地下一樓）</option>
        <option value="B2">B2（地下二樓）</option>
      </select>
    </div>
  </div>

  <!-- 區域 -->
  <div>
    <label class="field-label">區域 (Area)<span>*</span></label>
    <input id="input-area" type="text"
      class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
      placeholder="例如: 電梯廳, 走廊"/>
  </div>

  <!-- 缺失內容說明 -->
  <div>
    <label class="field-label">缺失內容說明 (Description)<span>*</span></label>
    <textarea id="input-desc" rows="4"
      class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none"
      placeholder="請詳細描述缺失狀況..."></textarea>
  </div>

  <!-- 缺失照片上傳 -->
  <div>
    <div class="flex justify-between items-center mb-2">
      <label class="field-label mb-0">缺失照片上傳 (Photos)</label>
      <span class="text-xs text-primary font-medium">最多 5 張</span>
    </div>
    <div id="photo-grid" class="flex flex-wrap gap-3">
      <!-- Upload slot -->
      <div class="photo-slot" onclick="document.getElementById('photo-input').click()">
        <span class="material-symbols-outlined" style="font-size:28px;">add_a_photo</span>
        <span style="font-size:10px;margin-top:4px;">點擊上傳</span>
      </div>
    </div>
    <input id="photo-input" type="file" accept="image/*" multiple class="hidden"/>
    <p class="text-xs text-slate-400 mt-2">支援 JPG、PNG、HEIC 格式</p>
  </div>

  <!-- 缺失處理期限 -->
  <div>
    <label class="field-label">缺失處理期限 (Deadline)<span>*</span></label>
    <div class="grid grid-cols-3 gap-2">
      <div class="relative">
        <select id="select-year" class="custom-select w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
          <option value="">年</option>
          <option value="2024">2024年</option>
          <option value="2025">2025年</option>
          <option value="2026">2026年</option>
        </select>
      </div>
      <div class="relative">
        <select id="select-month" class="custom-select w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
          <option value="">月</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </div>
      <div class="relative">
        <select id="select-day" class="custom-select w-full bg-white border border-slate-200 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
          <option value="">日</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Error -->
  <p id="error-msg" class="hidden text-red-500 text-sm text-center bg-red-50 rounded-xl py-3 px-4"></p>

</main>

<!-- Footer Buttons -->
<footer class="fixed bottom-0 left-0 right-0 bg-background-light/90 backdrop-blur-md border-t border-primary/10 p-4 z-50">
  <div class="flex gap-3 max-w-xl mx-auto">
    <button onclick="window.location.href='list.html'"
      class="flex-1 border-2 border-primary text-primary font-bold py-3.5 rounded-xl hover:bg-primary/5 transition-colors">
      取消 (Cancel)
    </button>
    <button id="btn-submit"
      class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined" style="font-size:20px;">send</span>
      提交 (Submit)
    </button>
  </div>
</footer>

<!-- Success Modal -->
<div id="success-modal" class="modal-overlay hidden">
  <div class="bg-white rounded-2xl p-8 mx-4 max-w-sm w-full text-center shadow-2xl">
    <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-green-500" style="font-size:48px;">check_circle</span>
    </div>
    <h2 class="text-xl font-bold text-slate-900 mb-2">提交成功！</h2>
    <p class="text-slate-500 text-sm mb-1">缺失單號：<span id="modal-issue-no" class="font-semibold text-primary"></span></p>
    <p class="text-slate-400 text-xs mb-6">系統已記錄您的缺失通報，相關負責人將盡快處理。</p>
    <button onclick="window.location.href='list.html'"
      class="w-full bg-primary text-white font-bold py-3 rounded-xl hover:bg-primary/90 transition-colors">
      返回清單
    </button>
  </div>
</div>

<script>
  // Auto-generate issue number
  function generateIssueNo() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const seq = String(Math.floor(Math.random() * 900) + 100);
    return `DEF-${y}${m}${d}-${seq}`;
  }

  const issueNo = generateIssueNo();
  document.getElementById('issue-no').value = issueNo;
  document.getElementById('modal-issue-no').textContent = issueNo;

  // Photo upload
  let uploadedPhotos = [];
  const photoInput = document.getElementById('photo-input');
  const photoGrid = document.getElementById('photo-grid');

  function renderPhotos() {
    // Clear existing previews
    photoGrid.querySelectorAll('.photo-preview-wrapper').forEach(el => el.remove());

    uploadedPhotos.forEach((file, idx) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'photo-preview-wrapper relative';
      wrapper.style.cssText = 'width:80px;height:80px;';

      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.className = 'photo-preview';

      const removeBtn = document.createElement('button');
      removeBtn.className = 'absolute top-1 right-1 bg-black/60 text-white rounded-full flex items-center justify-center hover:bg-red-500 transition-colors';
      removeBtn.style.cssText = 'width:20px;height:20px;padding:0;';
      removeBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">close</span>';
      removeBtn.onclick = () => {
        uploadedPhotos.splice(idx, 1);
        renderPhotos();
      };

      wrapper.appendChild(img);
      wrapper.appendChild(removeBtn);
      photoGrid.insertBefore(wrapper, photoGrid.querySelector('.photo-slot'));
    });

    // Hide upload slot if max reached
    const slot = photoGrid.querySelector('.photo-slot');
    if (slot) slot.style.display = uploadedPhotos.length >= 5 ? 'none' : '';
  }

  photoInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    const remaining = 5 - uploadedPhotos.length;
    const toAdd = files.slice(0, remaining);
    uploadedPhotos = uploadedPhotos.concat(toAdd);
    renderPhotos();
    photoInput.value = '';
  });

  // Day selector based on month/year
  function updateDays() {
    const year = parseInt(document.getElementById('select-year').value) || 2024;
    const month = parseInt(document.getElementById('select-month').value) || 1;
    const daySelect = document.getElementById('select-day');
    const currentDay = daySelect.value;
    const daysInMonth = new Date(year, month, 0).getDate();
    daySelect.innerHTML = '<option value="">日</option>';
    for (let i = 1; i <= daysInMonth; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i + '日';
      if (String(i) === currentDay) opt.selected = true;
      daySelect.appendChild(opt);
    }
  }

  document.getElementById('select-year').addEventListener('change', updateDays);
  document.getElementById('select-month').addEventListener('change', updateDays);
  updateDays();

  // Submit
  document.getElementById('btn-submit').addEventListener('click', () => {
    const system = document.getElementById('select-system').value;
    const contract = document.getElementById('select-contract').value;
    const floor = document.getElementById('select-floor').value;
    const area = document.getElementById('input-area').value.trim();
    const desc = document.getElementById('input-desc').value.trim();
    const year = document.getElementById('select-year').value;
    const month = document.getElementById('select-month').value;
    const day = document.getElementById('select-day').value;

    if (!system) { showError('請選擇系統別'); return; }
    if (!contract) { showError('請選擇合約編號'); return; }
    if (!floor) { showError('請選擇樓層'); return; }
    if (!area) { showError('請填寫區域'); return; }
    if (!desc) { showError('請填寫缺失內容說明'); return; }
    if (!year || !month || !day) { showError('請選擇缺失處理期限'); return; }

    document.getElementById('success-modal').classList.remove('hidden');
  });

  function showError(msg) {
    const err = document.getElementById('error-msg');
    err.textContent = msg;
    err.classList.remove('hidden');
    err.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => err.classList.add('hidden'), 3000);
  }
</script>
</body>
</html>
