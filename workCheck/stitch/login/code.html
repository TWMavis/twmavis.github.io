<!DOCTYPE html>

<html lang="zh-Hant"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans TC", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>工地缺失管理系統 - 登入</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="relative w-full max-w-md overflow-hidden rounded-xl bg-white dark:bg-slate-900 shadow-2xl">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0 opacity-10 bg-center bg-cover" data-alt="Professional construction site with cranes and building structure" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAzh5jJe6RBveBBH7GRgPmrBth50_zLWGFWOFY3x9Xa77UIjhhywbbt-e7S0gskwvSAA2wKpSbNY_j8XCQEAQcN8Y6d6TX7x_6k6vTC02Eng96Y6BoxXwdj4ZYk2oz7-wsGnvvN_ZPHlIDpBdtkA5fObMk4Bt-5QHmDzg4fu27-wx971_B548SAVFnIq_GmCbeTa41H3Irs1QjCuy8P_94cGMHBw3MULsPb9akLBWac5r47coX7CO8cJ38NeKClwPyvrqK_R2IfOCU");'>
</div>
<div class="relative z-10 p-8 flex flex-col items-center">
<!-- Logo Placeholder -->
<div class="mb-8 flex items-center justify-center w-20 h-20 rounded-full bg-primary/10">
<span class="material-symbols-outlined text-primary text-5xl">engineering</span>
</div>
<!-- Title -->
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">工地缺失管理系統</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-8">Site Deficiency Management System</p>
<!-- Login Type Toggle -->
<div class="flex w-full mb-8 p-1 bg-slate-100 dark:bg-slate-800 rounded-lg">
<button class="flex-1 py-2 text-sm font-semibold rounded-md bg-white dark:bg-slate-700 text-primary shadow-sm" id="btn-engineer">
                    福麟工程師
                </button>
<button class="flex-1 py-2 text-sm font-semibold rounded-md text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" id="btn-contractor">
                    下包商
                </button>
</div>
<!-- Form Fields -->
<div class="w-full space-y-6">
<!-- Engineer Field (Visible by default) -->
<div class="block" id="field-engineer">
<label class="block text-slate-700 dark:text-slate-300 text-sm font-medium mb-2">
                        員工編號 (Employee ID)
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="請輸入員工編號" type="text"/>
</div>
</div>
<!-- Contractor Field (Hidden by default logic via CSS/JS but shown as structural element here) -->
<div class="hidden" id="field-contractor">
<label class="block text-slate-700 dark:text-slate-300 text-sm font-medium mb-2">
                        合約編號/簡碼 (Contract No.)
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">description</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="請輸入合約編號或簡碼" type="text"/>
</div>
</div>
<!-- Common Password Field -->
<div>
<label class="block text-slate-700 dark:text-slate-300 text-sm font-medium mb-2">
                        密碼 (Password)
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-10 pr-10 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="請輸入密碼" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-slate-600">visibility</span>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center text-slate-500 dark:text-slate-400 cursor-pointer">
<input class="rounded border-slate-300 text-primary focus:ring-primary mr-2" type="checkbox"/>
                        記住登入資訊
                    </label>
<a class="text-primary hover:underline font-medium" href="#">忘記密碼？</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">login</span>
                    登入系統
                </button>
</div>
<!-- Footer -->
<footer class="mt-12 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500">
                    © 2024 福麟工程有限公司 版權所有
                </p>
<div class="mt-2 flex gap-4 justify-center">
<a class="text-xs text-slate-400 hover:text-primary" href="#">隱私條款</a>
<a class="text-xs text-slate-400 hover:text-primary" href="#">系統說明</a>
</div>
</footer>
</div>
</div>
</body></html>
