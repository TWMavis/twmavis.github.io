<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ec5b13",
          "background-light": "#f8f6f6",
          "background-dark": "#221610",
        },
        fontFamily: {
          "display": ["Inter", "Noto Sans TC", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
<title>工地缺失管理系統 - 登入</title>
<style>
  body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-background-light font-display min-h-screen flex items-center justify-center p-4">
<div class="relative w-full max-w-md overflow-hidden rounded-xl bg-white shadow-2xl">
  <!-- Background gradient overlay -->
  <div class="absolute inset-0 z-0 opacity-10" style="background: linear-gradient(135deg, #ec5b13 0%, #221610 100%);"></div>

  <div class="relative z-10 p-8 flex flex-col items-center">
    <!-- Logo -->
    <div class="mb-8 flex items-center justify-center w-20 h-20 rounded-full bg-primary/10">
      <span class="material-symbols-outlined text-primary" style="font-size:48px;">engineering</span>
    </div>
    <!-- Title -->
    <h1 class="text-slate-900 text-3xl font-bold tracking-tight mb-2">工地缺失管理系統</h1>
    <p class="text-slate-500 text-sm mb-8">Site Deficiency Management System</p>

    <!-- Login Type Toggle -->
    <div class="flex w-full mb-8 p-1 bg-slate-100 rounded-lg">
      <button id="btn-engineer"
        class="flex-1 py-2 text-sm font-semibold rounded-md bg-white text-primary shadow-sm transition-all">
        福麟工程師
      </button>
      <button id="btn-contractor"
        class="flex-1 py-2 text-sm font-semibold rounded-md text-slate-500 hover:text-primary transition-colors">
        下包商
      </button>
    </div>

    <!-- Form -->
    <div class="w-full space-y-6">
      <!-- Engineer Field -->
      <div id="field-engineer">
        <label class="block text-slate-700 text-sm font-medium mb-2">員工編號 (Employee ID)</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="font-size:20px;">badge</span>
          <input id="input-employee" class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 bg-white text-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="請輸入員工編號" type="text"/>
        </div>
      </div>
      <!-- Contractor Field -->
      <div id="field-contractor" class="hidden">
        <label class="block text-slate-700 text-sm font-medium mb-2">合約編號/簡碼 (Contract No.)</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="font-size:20px;">description</span>
          <input id="input-contract" class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 bg-white text-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="請輸入合約編號或簡碼" type="text"/>
        </div>
      </div>
      <!-- Password -->
      <div>
        <label class="block text-slate-700 text-sm font-medium mb-2">密碼 (Password)</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="font-size:20px;">lock</span>
          <input id="input-password" class="w-full pl-10 pr-10 py-3 rounded-lg border border-slate-200 bg-white text-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="請輸入密碼" type="password"/>
          <span id="toggle-pwd" class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-slate-600 select-none" style="font-size:20px;">visibility</span>
        </div>
      </div>
      <!-- Options -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-slate-500 cursor-pointer">
          <input class="rounded border-slate-300 text-primary focus:ring-primary mr-2" type="checkbox"/>
          記住登入資訊
        </label>
        <a class="text-primary hover:underline font-medium" href="#">忘記密碼？</a>
      </div>

      <!-- Error Message -->
      <p id="error-msg" class="hidden text-red-500 text-sm text-center bg-red-50 rounded-lg py-2 px-3"></p>

      <!-- Login Button -->
      <button id="btn-login"
        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-size:20px;">login</span>
        登入系統
      </button>
    </div>

    <!-- Footer -->
    <footer class="mt-12 text-center">
      <p class="text-xs text-slate-400">© 2024 福麟工程有限公司 版權所有</p>
      <div class="mt-2 flex gap-4 justify-center">
        <a class="text-xs text-slate-400 hover:text-primary" href="#">隱私條款</a>
        <a class="text-xs text-slate-400 hover:text-primary" href="#">系統說明</a>
      </div>
    </footer>
  </div>
</div>

<script>
  const btnEngineer = document.getElementById('btn-engineer');
  const btnContractor = document.getElementById('btn-contractor');
  const fieldEngineer = document.getElementById('field-engineer');
  const fieldContractor = document.getElementById('field-contractor');
  const togglePwd = document.getElementById('toggle-pwd');
  const inputPassword = document.getElementById('input-password');
  const btnLogin = document.getElementById('btn-login');
  const errorMsg = document.getElementById('error-msg');
  let currentRole = 'engineer';

  // Toggle between engineer and contractor
  btnEngineer.addEventListener('click', () => {
    currentRole = 'engineer';
    btnEngineer.classList.add('bg-white', 'text-primary', 'shadow-sm');
    btnEngineer.classList.remove('text-slate-500');
    btnContractor.classList.remove('bg-white', 'text-primary', 'shadow-sm');
    btnContractor.classList.add('text-slate-500');
    fieldEngineer.classList.remove('hidden');
    fieldContractor.classList.add('hidden');
  });

  btnContractor.addEventListener('click', () => {
    currentRole = 'contractor';
    btnContractor.classList.add('bg-white', 'text-primary', 'shadow-sm');
    btnContractor.classList.remove('text-slate-500');
    btnEngineer.classList.remove('bg-white', 'text-primary', 'shadow-sm');
    btnEngineer.classList.add('text-slate-500');
    fieldContractor.classList.remove('hidden');
    fieldEngineer.classList.add('hidden');
  });

  // Toggle password visibility
  togglePwd.addEventListener('click', () => {
    if (inputPassword.type === 'password') {
      inputPassword.type = 'text';
      togglePwd.textContent = 'visibility_off';
    } else {
      inputPassword.type = 'password';
      togglePwd.textContent = 'visibility';
    }
  });

  // Login
  btnLogin.addEventListener('click', () => {
    const idInput = currentRole === 'engineer'
      ? document.getElementById('input-employee')
      : document.getElementById('input-contract');

    const id = idInput.value.trim();
    const pwd = inputPassword.value.trim();

    if (!id) {
      showError(currentRole === 'engineer' ? '請輸入員工編號' : '請輸入合約編號或簡碼');
      return;
    }
    if (!pwd) {
      showError('請輸入密碼');
      return;
    }

    // Demo: any non-empty input passes
    btnLogin.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:20px;">progress_activity</span> 登入中...';
    btnLogin.disabled = true;

    setTimeout(() => {
      window.location.href = 'list.html';
    }, 800);
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.remove('hidden');
    setTimeout(() => errorMsg.classList.add('hidden'), 3000);
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btnLogin.click();
  });
</script>
</body>
</html>
